# tygo converts the Go DTOs in internal/types into TypeScript.
# Run via `make types` (or: go run github.com/gzuidhof/tygo@latest generate).
packages:
  - path: "github.com/jaireddjawed/fullstack-template-go-pocketbase/internal/types"
    output_path: "shared/types.gen.ts"
    frontmatter: |
      // Code generated by tygo from internal/types — DO NOT EDIT.
      // Regenerate with: make types
